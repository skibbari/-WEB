<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IZUMI — Выбор версии</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Raleway', sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 35px 35px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06);
        }

        .logo img {
            height: 65px;
            margin-bottom: 6px;
        }

        .logo h1 {
            font-size: 26px;
            font-weight: 800;
            color: #1e2a32;
        }

        .logo p {
            color: #5c6f87;
            font-size: 15px;
            margin-top: 4px;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 35px;
        }

        .card {
            background: #ffffff;
            border-radius: 20px;
            padding: 30px 24px 32px;
            border: 2px solid #eef2f6;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: #7db0d9;
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.06);
        }

        .card .icon {
            font-size: 38px;
            display: block;
            margin-bottom: 10px;
        }

        .card h2 {
            font-size: 18px;
            font-weight: 700;
            color: #1e2a32;
        }

        .card p {
            color: #5c6f87;
            font-size: 13px;
            line-height: 1.5;
            margin: 8px 0 14px;
        }

        .card .tag {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 14px;
            border-radius: 20px;
            background: #f1f5f9;
            color: #5c6f87;
        }

        .card .tag.manual {
            background: #e8f0fe;
            color: #5a92c0;
        }

        .card .tag.bootstrap {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .card .arrow {
            display: block;
            margin-top: 14px;
            font-weight: 700;
            color: #7db0d9;
            transition: transform 0.2s;
        }

        .card:hover .arrow {
            transform: translateX(4px);
        }

        .footer {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #eef2f6;
            font-size: 12px;
            color: #b0b0b0;
        }

        .footer a {
            color: #7db0d9;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 650px) {
            .container {
                padding: 28px 18px 24px;
                border-radius: 24px;
            }

            .cards {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .logo h1 {
                font-size: 21px;
            }

            .logo img {
                height: 50px;
            }

            .card {
                padding: 24px 18px 26px;
            }

            .card h2 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="logo">
            <h1>IZUMI</h1>
            <p>Выберите версию сайта</p>
        </div>

        <div class="cards">

            <a href="manual/index.html" class="card">
               
                <h2>Ручная вёрстка</h2>
                <span class="arrow">Перейти →</span>
            </a>

            <a href="bootstrap/index.html" class="card">
                
                <h2>Bootstrap 5</h2>
                <span class="arrow">Перейти →</span>
            </a>

        </div>
    </div>

</body>
</html>
